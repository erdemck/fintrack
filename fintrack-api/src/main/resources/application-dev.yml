spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/fintrack_dev
    username: fintrack_user
    password: fintrack_password
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: 8080

jwt:
  secret: 4f7a2b9c8e1d3f6a5b0c7d8e9f1a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a
  expiration-ms: 86400000
